    else utter.lang = preferredLang || 'bg-BG';

  }

  function setLoading(isLoading){
    verifyBtn.disabled = isLoading;
    if(isLoading){
      loadingBar.classList.add('active');

      loadingBar.classList.remove('active');

    card.className = 'result-card';

    const v = document.createElement('div');
    const normClass = verdict.toLowerCase().includes('вяр') || verdict.toLowerCase().includes('true') ? 'true' : 
                      verdict.toLowerCase().includes('невяр') || verdict.toLowerCase().includes('false') ? 'false' : 'uncertain';
    
    v.className = 'verdict ' + normClass;

    const claim = claimEl.value.trim();

    resultsEl.innerHTML = `<div class="result-card show"><div class="verdict">Проверка…</div><div class="explain">Анализирам...</div></div>`;

      const resp = await fetch('https://factcheck-noit.up.railway.app/fact-check', {
